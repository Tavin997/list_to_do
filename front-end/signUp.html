<!DOCTYPE html>
<html lang="pt-br" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Minhas Tarefas</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Nosso CSS separado -->
    <link rel="stylesheet" href="../assets/css/signUp.css">

    <style>
        /* Pequenos ajustes específicos da página */
        .password-toggle {
            cursor: pointer;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-left: none;
        }

        .password-toggle:hover {
            background: var(--alert-bg);
        }

        .requirements-list {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
            padding-left: 20px;
        }

        .requirements-list li {
            margin-bottom: 3px;
        }

        .requirements-list li.valid {
            color: #28a745;
        }

        .requirements-list li.invalid {
            color: #dc3545;
        }

        .alert-custom {
            background: var(--alert-bg);
            color: var(--text-primary);
            border-color: var(--border-color);
        }
    </style>
</head>

<body>
    <div class="theme-toggle">
        <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeToggleBtn">
            <i class="bi bi-moon-stars" id="themeIcon"></i>
            <span id="themeText">Modo Escuro</span>
        </button>
    </div>

    <div class="register-card">
        <div class="register-header">
            <i class="bi bi-person-plus-fill"></i>
            <h2>Criar Conta</h2>
            <p>Comece a organizar suas tarefas hoje</p>
        </div>

        <div class="register-body">
            <!-- FORMULÁRIO - action aponta para o PHP que processa -->
            <form id="registerForm" action="actions/signUp.cadastrar.php" method="POST">
                <div class="form-group">
                    <label for="name">Nome completo</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text" class="form-control" id="name" name="name"
                            placeholder="Digite seu nome completo" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-envelope"></i>
                        </span>
                        <input type="email" class="form-control" id="email" name="email" placeholder="seu@email.com"
                            required>
                    </div>
                    <div class="invalid-feedback" id="emailError" style="display: none;">
                        Por favor, insira um e-mail válido
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" class="form-control" id="password" name="password"
                            placeholder="Crie uma senha forte" required>
                        <span class="input-group-text password-toggle"
                            onclick="togglePassword('password', 'toggleIcon1')">
                            <i class="bi bi-eye" id="toggleIcon1"></i>
                        </span>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-bar-fill" id="strengthBar"></div>
                        </div>
                        <div class="requirements-list" id="passwordRequirements">
                            <small>Requisitos:</small>
                            <ul style="margin-top: 5px;">
                                <li id="reqLength">✗ Mínimo 6 caracteres</li>
                                <li id="reqUppercase">✗ Pelo menos uma letra maiúscula</li>
                                <li id="reqLowercase">✗ Pelo menos uma letra minúscula</li>
                                <li id="reqNumber">✗ Pelo menos um número</li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmar senha</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-shield-lock"></i>
                        </span>
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                            placeholder="Digite a senha novamente" required>
                        <span class="input-group-text password-toggle"
                            onclick="togglePassword('confirmPassword', 'toggleIcon2')">
                            <i class="bi bi-eye" id="toggleIcon2"></i>
                        </span>
                    </div>
                    <div class="invalid-feedback" id="confirmError" style="display: none;">
                        As senhas não conferem
                    </div>
                </div>

                <div class="form-group mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="termsCheckbox" name="termsCheckbox"
                            required>
                        <label class="form-check-label" for="termsCheckbox">
                            Eu concordo com os <a href="#" target="_blank">Termos de Serviço</a> e <a href="#"
                                target="_blank">Política de Privacidade</a>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn btn-register text-white" id="submitBtn">
                    <i class="bi bi-person-plus me-2"></i>Criar conta
                </button>
            </form>

            <div class="register-footer">
                <p>Já tem uma conta? <a href="login.html">Fazer login</a></p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Nosso JS separado -->
    <script src="../assets/js/signUp.js"></script>
</body>

</html>
